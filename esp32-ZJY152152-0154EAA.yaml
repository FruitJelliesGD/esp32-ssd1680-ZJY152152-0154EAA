esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  includes:
    - <climits>

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
api:
  encryption:
    key: !secret api_key
ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  ap:
    ssid: "${device_name} Fallback Hotspot"
    password: !secret ota_password

captive_portal:

time:
  - platform: sntp
    id: sntp_time
    timezone: Asia/Shanghai

spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23

font:
  - file:
      type: gfonts
      family: "Noto Sans SC"
      weight: 600
    id: font1
    size: 22
    glyphs: "1234567890%℃. -"

display:
  - platform: waveshare_epaper
    id: epaper_display
    model: "2.13in-ttgo-b74"          # Only model verified to work with ZJY152152-0154EAA
    cs_pin: GPIO15
    dc_pin: GPIO17
    reset_pin: GPIO16
    busy_pin: GPIO4
    update_interval: 60s              # Adjust as needed
    rotation: 90
    reset_duration: 2ms
    full_update_every: 1
    lambda: |-
      it.fill(Color::BLACK);
      it.strftime(12, 0, id(font2), Color::WHITE, "%Y-%m-%d", id(sntp_time).now());
      it.strftime(12, 20, id(font2), Color::WHITE, "%H:%M", id(sntp_time).now());
      it.printf(12, 50, id(font2), Color::WHITE, "Hello, World!");
